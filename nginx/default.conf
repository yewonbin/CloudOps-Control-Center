# Phase 2: Nginx reverse proxy.
# Terminates client HTTP on :80 and forwards to the FastAPI container.
# (TLS / :443 is added in Phase 5 once Cloudflare + a domain exist.)

upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Nginx answers this directly so an LB/monitor can check the proxy layer
    # without waking the app.
    location = /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
